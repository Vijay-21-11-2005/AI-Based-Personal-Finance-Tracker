<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceAI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        burgundy: '#93032E',
                        night: '#151515',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-night min-h-screen text-slate-200">
    <nav class="bg-[#1a1a1a] border-b border-burgundy/20 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-burgundy">FinanceAI</h1>
        <div class="flex items-center space-x-4">
            <span class="text-slate-400 text-sm hidden md:block">Welcome, {{ current_user.email }}</span>
            <a href="{{ url_for('logout') }}" class="text-slate-400 hover:text-burgundy transition-colors">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-[#1a1a1a] p-6 rounded-2xl shadow-sm border border-burgundy/10">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">Total Spent (Monthly)</p>
                <h2 id="total-spent" class="text-3xl font-bold text-slate-100 mt-2">$0.00</h2>
            </div>
            <div class="bg-burgundy p-6 rounded-2xl shadow-lg shadow-burgundy/20">
                <p class="text-sm font-medium text-burgundy-100 uppercase tracking-wider text-white/80">AI Predicted Next Month</p>
                <h2 id="predicted-spending" class="text-3xl font-bold text-white mt-2">$0.00</h2>
            </div>
            <div class="bg-[#1a1a1a] p-6 rounded-2xl shadow-sm border border-burgundy/10">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">Top Category</p>
                <h2 id="top-category" class="text-3xl font-bold text-slate-100 mt-2">-</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Add Expense & Budget Form -->
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-[#1a1a1a] p-6 rounded-2xl shadow-sm border border-burgundy/10 h-fit">
                    <h3 class="text-lg font-bold text-burgundy mb-4">Add Expense</h3>
                    <form id="expense-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Amount ($)</label>
                            <input type="number" step="0.01" id="amount" required 
                                   class="w-full p-2 bg-night border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-burgundy text-slate-200">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Description</label>
                            <input type="text" id="note" required placeholder="e.g. Starbucks coffee"
                                   class="w-full p-2 bg-night border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-burgundy text-slate-200 placeholder-slate-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Category</label>
                            <select id="category" class="w-full p-2 bg-night border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-burgundy text-slate-200">
                                <option value="">Auto-categorize</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-burgundy text-white font-semibold py-2 rounded-lg hover:bg-[#b00438] transition-colors shadow-lg shadow-burgundy/20">
                            Add Expense
                        </button>
                    </form>
                </div>

                <div class="bg-[#1a1a1a] p-6 rounded-2xl shadow-sm border border-burgundy/10 h-fit">
                    <h3 class="text-lg font-bold text-burgundy mb-4">Set Budget</h3>
                    <form id="budget-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Category</label>
                            <select id="budget-category" required class="w-full p-2 bg-night border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-burgundy text-slate-200">
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Monthly Limit ($)</label>
                            <input type="number" step="0.01" id="budget-amount" required 
                                   class="w-full p-2 bg-night border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-burgundy text-slate-200">
                        </div>
                        <button type="submit" class="w-full bg-slate-700 text-white font-semibold py-2 rounded-lg hover:bg-slate-600 transition-colors">
                            Update Budget
                        </button>
                    </form>
                </div>
            </div>

            <!-- Alerts Section -->
            <div id="alerts-container" class="hidden lg:block space-y-4">
                <!-- Alerts dynamic -->
            </div>

            <!-- Charts & Recent Expenses -->
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-[#1a1a1a] p-6 rounded-2xl shadow-sm border border-burgundy/10">
                    <h3 class="text-lg font-bold text-burgundy mb-4">Spending Breakdown</h3>
                    <div class="h-64">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="bg-[#1a1a1a] p-6 rounded-2xl shadow-sm border border-burgundy/10 overflow-hidden">
                    <h3 class="text-lg font-bold text-burgundy mb-4">Recent Expenses</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-night">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-semibold text-slate-500 uppercase">Date</th>
                                    <th class="px-4 py-2 text-left text-xs font-semibold text-slate-500 uppercase">Note</th>
                                    <th class="px-4 py-2 text-left text-xs font-semibold text-slate-500 uppercase">Category</th>
                                    <th class="px-4 py-2 text-right text-xs font-semibold text-slate-500 uppercase">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="expense-table-body" class="divide-y divide-slate-800">
                                <!-- Rows dynamic -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
